name: Reusable – Docker Build & Push

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to check out. Defaults to the calling workflow SHA.'
        type: string
        default: ''
      tags:
        description: 'Newline-separated list of fully-qualified image:tag pairs to apply.'
        type: string
        required: true
      labels:
        description: 'Newline-separated OCI label key=value pairs (from docker/metadata-action).'
        type: string
        default: ''
      push:
        description: 'Push the built image to the registry.'
        type: boolean
        default: true
      version:
        description: 'Version string to embed in the binary (e.g. v1.2.3).'
        type: string
        default: 'dev'
      built_by:
        description: 'Builder identifier to embed in the binary (e.g. gha.docker).'
        type: string
        default: 'local.docker'
      git_tree_state:
        description: 'Git tree state to embed in the binary (clean or dirty).'
        type: string
        default: 'unknown'

  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to check out.'
        type: string
        default: 'main'
      tags:
        description: 'Newline-separated list of fully-qualified image:tag pairs to apply.'
        type: string
        required: true
      labels:
        description: 'Newline-separated OCI label key=value pairs.'
        type: string
        default: ''
      push:
        description: 'Push the built image to the registry.'
        type: boolean
        default: false   # safer default for manual runs
      version:
        description: 'Version string to embed in the binary (e.g. v1.2.3).'
        type: string
        default: 'dev'
      built_by:
        description: 'Builder identifier to embed in the binary (e.g. gha.docker).'
        type: string
        default: 'local.docker'
      git_tree_state:
        description: 'Git tree state to embed in the binary (clean or dirty).'
        type: string
        default: 'unknown'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ inputs.ref || github.sha }}

    - name: Log in to GHCR
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build and push
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: ./package/Dockerfile
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: |
          org.opencontainers.image.vendor=MallardDuck
          org.opencontainers.image.authors=https://github.com/mallardduck
          org.opencontainers.image.description=Filesystem-native S3-compatible object store. Objects are files, buckets are directories.
          org.opencontainers.image.ref.name=ghcr.io/${{ github.repository }}
          ${{ inputs.labels }}
        build-args: |
          VERSION=${{ inputs.version }}
          COMMIT=${{ github.sha }}
          BUILD_TIME=${{ github.event.head_commit.timestamp }}
          BUILT_BY=${{ inputs.built_by }}
          GIT_TREE_STATE=${{ inputs.git_tree_state }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
