name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────────
  tests:
    uses: ./.github/workflows/_reusable-tests.yml

  # ── Binary release (draft) ────────────────────────────────────────────────────
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Fetch all tags
      run: git fetch --force --tags

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: '1.26'
        cache: true

    - name: Install Task
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container image release ───────────────────────────────────────────────────
  # Metadata computation runs in parallel with goreleaser (both need only tests).
  # The undraft job acts as the final gate — nothing is public until both
  # goreleaser and docker have succeeded.
  meta:
    name: Compute Image Metadata
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      tags:   ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
      with:
        images: ghcr.io/${{ github.repository }}
        labels: |
          org.opencontainers.image.vendor=MallardDuck
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

  docker:
    name: Release Image
    needs: [meta]
    uses: ./.github/workflows/_reusable-docker.yml
    with:
      tags:           ${{ needs.meta.outputs.tags }}
      labels:         ${{ needs.meta.outputs.labels }}
      push:           true
      version:        ${{ github.ref_name }}
      built_by:       gha.docker
      git_tree_state: clean
    secrets: inherit

  # ── Publish ───────────────────────────────────────────────────────────────────
  undraft:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [goreleaser, docker]

    steps:
    - name: Undraft GitHub release
      run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
